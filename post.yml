name: Daily Semiconductor News Bot

on:
  schedule:
    # UTC 23:00 = JST 翌8:00 に実行（日本時間 朝8時に投稿）
    # 投稿時刻を変えたい場合は、JSTの時刻から9時間引いた値をUTCで指定してください
    # 例: JST 20:00に投稿したい -> UTC 11:00 -> "0 11 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch: {}  # 手動実行用（Actionsタブからテスト実行できる）

permissions:
  contents: write  # state.json をコミットし直すために必要

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: ボットを実行
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python bot.py

      - name: 投稿履歴(state.json)の更新を保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "update posted history"
          git push
